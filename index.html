<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kolhapur Tourism</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" href="./image/kolhapur.webp">

    <style>

        body {
            margin: 0;
            padding: 0;
            background-color: deepskyblue;
            font-family: "Merriweather", serif;
        }

        header {
            background-color: rgb(104, 150, 235);
            color: white;
            padding: 30px 20px;
            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top_header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;

            font-family: "Science Gothic", sans-serif;
        }

        .logo {
            height: 80px;
            width: auto;
            border-radius: 50%;
        }

        .top_header h1 {
            font-size: 32px;
            letter-spacing: 3px;
            margin: 0;
        }

        nav {
            margin-top: 10px;
            font-size: 18px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        nav a:hover {
            color: yellow;
            text-decoration: underline;
        }

        nav a:not(:last-child)::after {
            content: "|";
            margin-left: 10px;
        }

        .content_section {
            max-width: 900px;
            width: 90%;
            margin: 30px auto;
            background-color: rgb(202, 74, 34);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 15px blue;
        }

        .content_section h2 {
            text-align: center;
            color: white;
        }

        .content_section p {
            text-align: center;
            color: blue;
            font-size: 18px;
            font-weight: bold;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .gallery img {
            width: 240px;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 0 10px blue;
        }

        footer {
            background-color: rgb(42, 177, 98);
            text-align: center;
            padding: 20px;
            color: white;
        }

        .sicon a {
            margin: 0 10px;
            color: yellow;
            text-decoration: none;
            font-size: 1.5rem;
        }

        .sicon a:hover {
            color: white;
        }

    </style>
</head>

<body>

    <header>

        <div class="top_header">
            <img src="./image/kolhapur.webp" alt="Kolhapur Logo"
                class="logo">

            <h1><i>DISCOVER KOLHAPUR!!!</i></h1>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Places to Visit</a>
            <a href="#">Gallery</a>
            <a href="#">Booking</a>
            <a href="#">Contact Us</a>
            <a href="#">About Us</a>
        </nav>

    </header>

    <section class="content_section">

        <h2>Explore with Photos</h2>

        <p>Follow us on social media to know more about Kolhapur tourism.</p>

        <div class="gallery">

            <img src="./image/tour1.jpg" alt="Tour Image 1">

            <img src="./image/tour2.jpg" alt="Tour Image 2">

            <img src="./image/tour3.jpg" alt="Tour Image 3">

        </div>

    </section>

    <footer>

        <h2>Connect With Us</h2>

        <div class="sicon">

            <a href="https://www.instagram.com/kolhapur_survey/?hl=en"
                target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-facebook"></i>
            </a>

        </div>

    </footer>

</body>

</html>
